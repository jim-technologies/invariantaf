syntax = "proto3";

package etherscan.v1;

// EtherscanService provides Ethereum blockchain data from the Etherscan API,
// the leading block explorer and analytics platform for Ethereum.
//
// Requires an API key set via the ETHERSCAN_API_KEY environment variable.
// A free tier API key is available at https://etherscan.io/apis.
//
// Use this to monitor wallets, track whale movements, inspect smart contracts,
// check gas prices, and query ETH/token balances and transfers.
service EtherscanService {

  // Get the ETH balance of an address.
  //
  // Returns the current ETH balance (in wei) of the specified Ethereum address.
  // Use this to check wallet balances and monitor holdings.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // Get the ERC-20 token balance of an address.
  //
  // Returns the token balance of the specified address for a given ERC-20
  // token contract. The balance is returned in the token's smallest unit.
  // Use this to track token holdings across wallets.
  rpc GetTokenBalance(GetTokenBalanceRequest) returns (GetTokenBalanceResponse);

  // Get the list of transactions for an address.
  //
  // Returns normal transactions for the specified address, sorted by
  // block number descending. Includes value, gas, and status information.
  // Use this to audit transaction history and monitor wallet activity.
  rpc GetTransactions(GetTransactionsRequest) returns (GetTransactionsResponse);

  // Get ERC-20 token transfer events for an address.
  //
  // Returns all ERC-20 token transfer events involving the specified address.
  // Includes token name, symbol, value, and contract address.
  // Use this to track token movements and whale activity.
  rpc GetTokenTransfers(GetTokenTransfersRequest) returns (GetTokenTransfersResponse);

  // Get current gas prices.
  //
  // Returns the current safe, proposed, and fast gas prices from the
  // Etherscan gas oracle. Prices are in Gwei.
  // Use this to estimate transaction costs and optimize gas spending.
  rpc GetGasPrice(GetGasPriceRequest) returns (GetGasPriceResponse);

  // Get the current ETH price.
  //
  // Returns the current price of ETH in both USD and BTC.
  // Use this for price monitoring and portfolio valuation.
  rpc GetETHPrice(GetETHPriceRequest) returns (GetETHPriceResponse);

  // Get the ABI of a verified smart contract.
  //
  // Returns the contract ABI as a JSON string for verified contracts
  // on Etherscan. Use this to interact with and analyze smart contracts.
  rpc GetContractABI(GetContractABIRequest) returns (GetContractABIResponse);
}

// --- Domain types ---

message Transaction {
  // Block number containing this transaction.
  string block_number = 1;
  // Unix timestamp of the block.
  string time_stamp = 2;
  // Transaction hash.
  string hash = 3;
  // Sender address.
  string from = 4;
  // Recipient address.
  string to = 5;
  // Value transferred in wei.
  string value = 6;
  // Gas used by the transaction.
  string gas_used = 7;
  // Gas price in wei.
  string gas_price = 8;
  // Transaction success status ("1" = success, "0" = failure).
  string is_error = 9;
  // Contract address (if contract creation).
  string contract_address = 10;
  // Input data.
  string input = 11;
  // Nonce of the transaction.
  string nonce = 12;
  // Transaction index within the block.
  string transaction_index = 13;
  // Gas limit.
  string gas = 14;
  // Number of block confirmations.
  string confirmations = 15;
}

message TokenTransfer {
  // Block number containing this transfer.
  string block_number = 1;
  // Unix timestamp of the block.
  string time_stamp = 2;
  // Transaction hash.
  string hash = 3;
  // Sender address.
  string from = 4;
  // Recipient address.
  string to = 5;
  // Token amount transferred (in smallest unit).
  string value = 6;
  // Token name.
  string token_name = 7;
  // Token symbol.
  string token_symbol = 8;
  // Token decimals.
  string token_decimal = 9;
  // Token contract address.
  string contract_address = 10;
  // Gas used by the transaction.
  string gas_used = 11;
  // Gas price in wei.
  string gas_price = 12;
  // Nonce.
  string nonce = 13;
  // Number of block confirmations.
  string confirmations = 14;
}

message GasOracle {
  // Safe (low) gas price in Gwei.
  string safe_gas_price = 1;
  // Proposed (standard) gas price in Gwei.
  string propose_gas_price = 2;
  // Fast gas price in Gwei.
  string fast_gas_price = 3;
  // Suggested base fee in Gwei.
  string suggest_base_fee = 4;
  // Gas used ratio.
  string gas_used_ratio = 5;
}

message ETHPrice {
  // ETH price in USD.
  string ethusd = 1;
  // ETH price in BTC.
  string ethbtc = 2;
  // Timestamp of the USD price.
  string ethusd_timestamp = 3;
  // Timestamp of the BTC price.
  string ethbtc_timestamp = 4;
}

// --- Request / Response messages ---

message GetBalanceRequest {
  // Ethereum address to query.
  string address = 1;
}

message GetBalanceResponse {
  // ETH balance in wei.
  string balance = 1;
}

message GetTokenBalanceRequest {
  // Ethereum address to query.
  string address = 1;
  // ERC-20 token contract address.
  string contract_address = 2;
}

message GetTokenBalanceResponse {
  // Token balance in the token's smallest unit.
  string balance = 1;
}

message GetTransactionsRequest {
  // Ethereum address to query.
  string address = 1;
  // Start block number (default: 0).
  int64 start_block = 2;
  // End block number (default: 99999999).
  int64 end_block = 3;
  // Sort order: "asc" or "desc" (default: "desc").
  string sort = 4;
}

message GetTransactionsResponse {
  repeated Transaction transactions = 1;
}

message GetTokenTransfersRequest {
  // Ethereum address to query.
  string address = 1;
  // Start block number (default: 0).
  int64 start_block = 2;
  // End block number (default: 99999999).
  int64 end_block = 3;
  // Sort order: "asc" or "desc" (default: "desc").
  string sort = 4;
}

message GetTokenTransfersResponse {
  repeated TokenTransfer transfers = 1;
}

message GetGasPriceRequest {}

message GetGasPriceResponse {
  GasOracle gas_oracle = 1;
}

message GetETHPriceRequest {}

message GetETHPriceResponse {
  ETHPrice eth_price = 1;
}

message GetContractABIRequest {
  // Contract address to query.
  string address = 1;
}

message GetContractABIResponse {
  // Contract ABI as a JSON string.
  string abi = 1;
}
