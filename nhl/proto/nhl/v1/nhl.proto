syntax = "proto3";

package nhl.v1;

// NHLService proxies public endpoints from the NHL API.
service NHLService {
  // List all NHL teams from current standings.
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);

  // Get full NHL standings with W/L/OTL/points.
  rpc GetStandings(GetStandingsRequest) returns (GetStandingsResponse);

  // Get schedule (games) for a specific date or today.
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);

  // Get detailed boxscore for a specific game.
  rpc GetGameBoxscore(GetGameBoxscoreRequest) returns (GetGameBoxscoreResponse);

  // Get player career and season stats.
  rpc GetPlayerStats(GetPlayerStatsRequest) returns (GetPlayerStatsResponse);

  // Get a team's full season schedule.
  rpc GetTeamSchedule(GetTeamScheduleRequest) returns (GetTeamScheduleResponse);

  // Get a team's current roster.
  rpc GetTeamRoster(GetTeamRosterRequest) returns (GetTeamRosterResponse);

  // Get today's scoreboard with live scores.
  rpc GetScoreboard(GetScoreboardRequest) returns (GetScoreboardResponse);
}

// --- ListTeams ---

message ListTeamsRequest {}

message Team {
  string team_abbrev = 1;
  string team_name = 2;
  string conference_name = 3;
  string division_name = 4;
  string team_logo = 5;
}

message ListTeamsResponse {
  repeated Team teams = 1;
}

// --- GetStandings ---

message GetStandingsRequest {}

message StandingsEntry {
  string team_abbrev = 1;
  string team_name = 2;
  string conference_name = 3;
  string division_name = 4;
  int32 games_played = 5;
  int32 wins = 6;
  int32 losses = 7;
  int32 ot_losses = 8;
  int32 points = 9;
  int32 regulation_wins = 10;
  int32 goal_for = 11;
  int32 goal_against = 12;
  int32 goal_differential = 13;
  double point_pctg = 14;
  string streak_code = 15;
  int32 streak_count = 16;
  int32 league_sequence = 17;
  int32 conference_sequence = 18;
  int32 division_sequence = 19;
  int32 wildcard_sequence = 20;
  string team_logo = 21;
  double win_pctg = 22;
  int32 home_wins = 23;
  int32 home_losses = 24;
  int32 home_ot_losses = 25;
  int32 road_wins = 26;
  int32 road_losses = 27;
  int32 road_ot_losses = 28;
  int32 shootout_wins = 29;
  int32 shootout_losses = 30;
  int32 l10_wins = 31;
  int32 l10_losses = 32;
  int32 l10_ot_losses = 33;
}

message GetStandingsResponse {
  repeated StandingsEntry standings = 1;
}

// --- GetSchedule ---

message GetScheduleRequest {
  // Date in YYYY-MM-DD format. Omit for today.
  optional string date = 1;
}

message ScheduleTeam {
  int32 id = 1;
  string abbrev = 2;
  string name = 3;
  string logo = 4;
  int32 score = 5;
}

message ScheduleGame {
  int64 id = 1;
  int32 season = 2;
  int32 game_type = 3;
  string game_date = 4;
  string venue = 5;
  string start_time_utc = 6;
  string game_state = 7;
  ScheduleTeam away_team = 8;
  ScheduleTeam home_team = 9;
}

message GetScheduleResponse {
  repeated ScheduleGame games = 1;
}

// --- GetGameBoxscore ---

message GetGameBoxscoreRequest {
  // Numeric game ID.
  int64 game_id = 1;
}

message SkaterStats {
  int64 player_id = 1;
  string name = 2;
  string position = 3;
  int32 sweater_number = 4;
  int32 goals = 5;
  int32 assists = 6;
  int32 points = 7;
  int32 plus_minus = 8;
  int32 pim = 9;
  int32 hits = 10;
  int32 shots = 11;
  int32 blocked_shots = 12;
  string toi = 13;
  int32 power_play_goals = 14;
  double faceoff_winning_pctg = 15;
  int32 takeaways = 16;
  int32 giveaways = 17;
  int32 shifts = 18;
}

message GoalieStats {
  int64 player_id = 1;
  string name = 2;
  int32 sweater_number = 3;
  string toi = 4;
  int32 saves = 5;
  int32 shots_against = 6;
  int32 goals_against = 7;
  double save_pctg = 8;
  string decision = 9;
  bool starter = 10;
  string even_strength_shots_against = 11;
  string power_play_shots_against = 12;
  string shorthanded_shots_against = 13;
}

message BoxscoreTeam {
  int32 id = 1;
  string abbrev = 2;
  string name = 3;
  int32 score = 4;
  int32 sog = 5;
  repeated SkaterStats forwards = 6;
  repeated SkaterStats defense = 7;
  repeated GoalieStats goalies = 8;
}

message GetGameBoxscoreResponse {
  int64 id = 1;
  int32 season = 2;
  int32 game_type = 3;
  string game_date = 4;
  string venue = 5;
  string start_time_utc = 6;
  string game_state = 7;
  BoxscoreTeam away_team = 8;
  BoxscoreTeam home_team = 9;
}

// --- GetPlayerStats ---

message GetPlayerStatsRequest {
  // NHL player ID.
  int64 player_id = 1;
}

message PlayerSeasonStats {
  int32 goals = 1;
  int32 assists = 2;
  int32 points = 3;
  int32 games_played = 4;
  int32 plus_minus = 5;
  int32 power_play_goals = 6;
  int32 power_play_points = 7;
  int32 shots = 8;
  double shooting_pctg = 9;
}

message PlayerCareerTotals {
  int32 goals = 1;
  int32 assists = 2;
  int32 points = 3;
  int32 games_played = 4;
  int32 plus_minus = 5;
  int32 power_play_goals = 6;
  int32 power_play_points = 7;
  int32 shots = 8;
  int32 pim = 9;
  int32 game_winning_goals = 10;
  int32 ot_goals = 11;
}

message GetPlayerStatsResponse {
  int64 player_id = 1;
  string first_name = 2;
  string last_name = 3;
  string position = 4;
  int32 sweater_number = 5;
  string team_abbrev = 6;
  string birth_date = 7;
  string birth_city = 8;
  string birth_country = 9;
  string shoots_catches = 10;
  int32 height_in_inches = 11;
  int32 weight_in_pounds = 12;
  string headshot = 13;
  bool is_active = 14;
  PlayerSeasonStats current_season_stats = 15;
  PlayerCareerTotals career_totals = 16;
}

// --- GetTeamSchedule ---

message GetTeamScheduleRequest {
  // Team abbreviation (e.g. "TOR", "EDM").
  string team_abbrev = 1;
}

message TeamScheduleGame {
  int64 id = 1;
  int32 season = 2;
  int32 game_type = 3;
  string game_date = 4;
  string venue = 5;
  string start_time_utc = 6;
  string game_state = 7;
  ScheduleTeam away_team = 8;
  ScheduleTeam home_team = 9;
}

message GetTeamScheduleResponse {
  repeated TeamScheduleGame games = 1;
}

// --- GetTeamRoster ---

message GetTeamRosterRequest {
  // Team abbreviation (e.g. "TOR", "EDM").
  string team_abbrev = 1;
}

message RosterPlayer {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int32 sweater_number = 4;
  string position_code = 5;
  string shoots_catches = 6;
  int32 height_in_inches = 7;
  int32 weight_in_pounds = 8;
  string birth_date = 9;
  string birth_city = 10;
  string birth_country = 11;
  string headshot = 12;
}

message GetTeamRosterResponse {
  repeated RosterPlayer forwards = 1;
  repeated RosterPlayer defensemen = 2;
  repeated RosterPlayer goalies = 3;
}

// --- GetScoreboard ---

message GetScoreboardRequest {}

message ScoreboardGame {
  int64 id = 1;
  string game_date = 2;
  string start_time_utc = 3;
  string game_state = 4;
  string venue = 5;
  ScheduleTeam away_team = 6;
  ScheduleTeam home_team = 7;
  int32 period = 8;
  string clock = 9;
}

message GetScoreboardResponse {
  repeated ScoreboardGame games = 1;
}
