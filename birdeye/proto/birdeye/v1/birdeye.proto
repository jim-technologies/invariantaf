syntax = "proto3";

package birdeye.v1;

// BirdeyeService proxies Birdeye Solana DEX data endpoints.
service BirdeyeService {
  // Get current price for a single token.
  rpc GetTokenPrice(GetTokenPriceRequest) returns (GetTokenPriceResponse);

  // Get prices for multiple tokens at once.
  rpc GetMultiPrice(GetMultiPriceRequest) returns (GetMultiPriceResponse);

  // Get detailed token overview: price, volume, liquidity, price changes, trade counts.
  rpc GetTokenOverview(GetTokenOverviewRequest) returns (GetTokenOverviewResponse);

  // List top tokens by volume or liquidity.
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);

  // Get OHLCV candlestick data for a token.
  rpc GetOHLCV(GetOHLCVRequest) returns (GetOHLCVResponse);

  // Get recent trades for a token.
  rpc GetTradesToken(GetTradesTokenRequest) returns (GetTradesTokenResponse);

  // Search tokens by name or symbol.
  rpc SearchToken(SearchTokenRequest) returns (SearchTokenResponse);
}

// --- GetTokenPrice ---

message GetTokenPriceRequest {
  // Solana token address
  string address = 1;
}

message GetTokenPriceResponse {
  double value = 1;
  double update_unix_time = 2;
  string update_human_time = 3;
}

// --- GetMultiPrice ---

message GetMultiPriceRequest {
  // Comma-separated list of token addresses
  string list_address = 1;
}

message TokenPrice {
  double value = 1;
  double update_unix_time = 2;
  string update_human_time = 3;
}

message GetMultiPriceResponse {
  map<string, TokenPrice> prices = 1;
}

// --- GetTokenOverview ---

message GetTokenOverviewRequest {
  // Solana token address
  string address = 1;
}

message GetTokenOverviewResponse {
  string address = 1;
  string symbol = 2;
  string name = 3;
  int32 decimals = 4;
  double price = 5;
  double liquidity = 6;
  double v24h_usd = 7;
  double v24h_change_percent = 8;
  double mc = 9;
  double price_change_24h_percent = 10;
  int64 trade_24h = 11;
  int64 sell_24h = 12;
  int64 buy_24h = 13;
  double holder = 14;
  string logo_uri = 15;
  int64 last_trade_unix_time = 16;
}

// --- ListTokens ---

message ListTokensRequest {
  // Sort field: "v24hUSD", "mc", "liquidity"
  optional string sort_by = 1;
  // Sort direction: "asc" or "desc"
  optional string sort_type = 2;
  // Number of tokens to return (max 50)
  optional int32 limit = 3;
  // Offset for pagination
  optional int32 offset = 4;
}

message TokenListItem {
  string address = 1;
  string symbol = 2;
  string name = 3;
  int32 decimals = 4;
  double price = 5;
  double liquidity = 6;
  double v24h_usd = 7;
  double mc = 8;
  double v24h_change_percent = 9;
  string logo_uri = 10;
  int64 last_trade_unix_time = 11;
}

message ListTokensResponse {
  repeated TokenListItem tokens = 1;
}

// --- GetOHLCV ---

message GetOHLCVRequest {
  // Solana token address
  string address = 1;
  // Candle type: "1m", "3m", "5m", "15m", "30m", "1H", "2H", "4H", "6H", "8H", "12H", "1D", "3D", "1W", "1M"
  string type = 2;
  // Start unix timestamp (seconds)
  int64 time_from = 3;
  // End unix timestamp (seconds)
  int64 time_to = 4;
}

message OHLCVItem {
  double o = 1;
  double h = 2;
  double l = 3;
  double c = 4;
  double v = 5;
  int64 unix_time = 6;
  string type = 7;
  string address = 8;
}

message GetOHLCVResponse {
  repeated OHLCVItem items = 1;
}

// --- GetTradesToken ---

message GetTradesTokenRequest {
  // Solana token address
  string address = 1;
  // Number of trades to return
  optional int32 limit = 2;
  // Offset for pagination
  optional int32 offset = 3;
}

message TradeItem {
  string tx_hash = 1;
  string source = 2;
  int64 block_unix_time = 3;
  string side = 4;
  string token_address = 5;
  double amount = 6;
  double volume_usd = 7;
  double price = 8;
}

message GetTradesTokenResponse {
  repeated TradeItem items = 1;
}

// --- SearchToken ---

message SearchTokenRequest {
  // Search keyword (name, symbol, or address)
  string keyword = 1;
}

message SearchTokenItem {
  string address = 1;
  string symbol = 2;
  string name = 3;
  double price = 4;
  double liquidity = 5;
  double v24h_usd = 6;
  string logo_uri = 7;
  string network = 8;
}

message SearchTokenResponse {
  repeated SearchTokenItem tokens = 1;
}
