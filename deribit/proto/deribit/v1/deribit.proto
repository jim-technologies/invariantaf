syntax = "proto3";

package deribit.v1;

// DeribitService proxies public market data endpoints from the Deribit exchange.
service DeribitService {
  // List instruments (options, futures, spot) for a currency.
  rpc GetInstruments(GetInstrumentsRequest) returns (GetInstrumentsResponse);

  // Get order book for an instrument.
  rpc GetOrderbook(GetOrderbookRequest) returns (GetOrderbookResponse);

  // Get ticker data for an instrument.
  rpc GetTicker(GetTickerRequest) returns (GetTickerResponse);

  // Get book summaries for all instruments of a currency and kind.
  rpc GetBookSummaryByCurrency(GetBookSummaryByCurrencyRequest) returns (GetBookSummaryByCurrencyResponse);

  // Get historical volatility data for a currency.
  rpc GetHistoricalVolatility(GetHistoricalVolatilityRequest) returns (GetHistoricalVolatilityResponse);

  // Get funding rate value for a perpetual instrument over a time range.
  rpc GetFundingRateValue(GetFundingRateValueRequest) returns (GetFundingRateValueResponse);

  // Get index price for a given index name.
  rpc GetIndexPrice(GetIndexPriceRequest) returns (GetIndexPriceResponse);

  // Get TradingView OHLCV chart data for an instrument.
  rpc GetTradingviewChartData(GetTradingviewChartDataRequest) returns (GetTradingviewChartDataResponse);
}

// --- GetInstruments ---

message GetInstrumentsRequest {
  // Currency: "BTC", "ETH", etc.
  string currency = 1;
  // Kind: "option", "future", "spot"
  optional string kind = 2;
  // Whether to include expired instruments
  optional bool expired = 3;
}

message Instrument {
  string instrument_name = 1;
  string kind = 2;
  string base_currency = 3;
  string quote_currency = 4;
  string settlement_period = 5;
  double min_trade_amount = 6;
  double tick_size = 7;
  double strike = 8;
  string option_type = 9;
  int64 expiration_timestamp = 10;
  int64 creation_timestamp = 11;
  bool is_active = 12;
}

message GetInstrumentsResponse {
  repeated Instrument instruments = 1;
}

// --- GetOrderbook ---

message GetOrderbookRequest {
  // Instrument name (required, e.g. "BTC-PERPETUAL")
  string instrument_name = 1;
  // Number of entries to return on each side (optional)
  optional int32 depth = 2;
}

message OrderbookLevel {
  double price = 1;
  double amount = 2;
}

message GetOrderbookResponse {
  string instrument_name = 1;
  double best_bid_price = 2;
  double best_bid_amount = 3;
  double best_ask_price = 4;
  double best_ask_amount = 5;
  repeated OrderbookLevel bids = 6;
  repeated OrderbookLevel asks = 7;
  double last_price = 8;
  double mark_price = 9;
  double index_price = 10;
  double open_interest = 11;
  double funding_8h = 12;
  double current_funding = 13;
  int64 timestamp = 14;
  string state = 15;
}

// --- GetTicker ---

message GetTickerRequest {
  // Instrument name (required, e.g. "BTC-PERPETUAL")
  string instrument_name = 1;
}

message Greeks {
  double delta = 1;
  double gamma = 2;
  double vega = 3;
  double theta = 4;
  double rho = 5;
}

message GetTickerResponse {
  string instrument_name = 1;
  double best_bid_price = 2;
  double best_ask_price = 3;
  double last_price = 4;
  double mark_price = 5;
  double index_price = 6;
  double open_interest = 7;
  double volume_usd = 8;
  double high = 9;
  double low = 10;
  double estimated_delivery_price = 11;
  double mark_iv = 12;
  double bid_iv = 13;
  double ask_iv = 14;
  double underlying_price = 15;
  string underlying_index = 16;
  Greeks greeks = 17;
  double funding_8h = 18;
  double interest_rate = 19;
  int64 timestamp = 20;
}

// --- GetBookSummaryByCurrency ---

message GetBookSummaryByCurrencyRequest {
  // Currency: "BTC", "ETH"
  string currency = 1;
  // Kind: "option", "future"
  optional string kind = 2;
}

message BookSummary {
  string instrument_name = 1;
  double volume_usd = 2;
  double open_interest = 3;
  double bid_price = 4;
  double ask_price = 5;
  double last = 6;
  double mark_price = 7;
  double mark_iv = 8;
  double underlying_price = 9;
  string underlying_index = 10;
  double interest_rate = 11;
  double funding_8h = 12;
}

message GetBookSummaryByCurrencyResponse {
  repeated BookSummary summaries = 1;
}

// --- GetHistoricalVolatility ---

message GetHistoricalVolatilityRequest {
  // Currency: "BTC", "ETH"
  string currency = 1;
}

message VolatilityPoint {
  int64 timestamp = 1;
  double volatility = 2;
}

message GetHistoricalVolatilityResponse {
  repeated VolatilityPoint data = 1;
}

// --- GetFundingRateValue ---

message GetFundingRateValueRequest {
  // Instrument name (required, e.g. "BTC-PERPETUAL")
  string instrument_name = 1;
  // Start timestamp in milliseconds
  int64 start_timestamp = 2;
  // End timestamp in milliseconds
  int64 end_timestamp = 3;
}

message GetFundingRateValueResponse {
  double funding_rate = 1;
}

// --- GetIndexPrice ---

message GetIndexPriceRequest {
  // Index name (e.g. "btc_usd", "eth_usd")
  string index_name = 1;
}

message GetIndexPriceResponse {
  double index_price = 1;
  double estimated_delivery_price = 2;
}

// --- GetTradingviewChartData ---

message GetTradingviewChartDataRequest {
  // Instrument name (required, e.g. "BTC-PERPETUAL")
  string instrument_name = 1;
  // Start timestamp in milliseconds
  int64 start_timestamp = 2;
  // End timestamp in milliseconds
  int64 end_timestamp = 3;
  // Resolution: "1", "3", "5", "10", "15", "30", "60", "120", "180", "360", "720", "1D"
  string resolution = 4;
}

message GetTradingviewChartDataResponse {
  repeated int64 ticks = 1;
  repeated double open = 2;
  repeated double high = 3;
  repeated double low = 4;
  repeated double close = 5;
  repeated double volume = 6;
  string status = 7;
}
