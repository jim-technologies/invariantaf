syntax = "proto3";

package opendota.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

// OpenDotaService exposes every GET/POST operation from the OpenDota OpenAPI spec.
//
// Request messages include explicit path params plus optional `query` and `body` structs.
// Responses use typed data messages derived from the OpenDota OpenAPI spec.
service OpenDotaService {
  // Benchmarks of average stat values for a hero
  rpc GetBenchmarks(GetBenchmarksRequest) returns (GetBenchmarksResponse) {
    option (google.api.http) = {
      get: "/benchmarks"
      response_body: "data"
    };
  }

  // Get static game data mirrored from the dotaconstants repository.
  rpc GetConstantsResource(GetConstantsResourceRequest) returns (GetConstantsResourceResponse) {
    option (google.api.http) = {
      get: "/constants/{resource}"
      response_body: "data"
    };
  }

  // Distributions of MMR data by bracket and country
  rpc GetDistributions(GetDistributionsRequest) returns (GetDistributionsResponse) {
    option (google.api.http) = {
      get: "/distributions"
      response_body: "data"
    };
  }

  // Submit arbitrary SQL queries to the database
  rpc GetExplorer(GetExplorerRequest) returns (GetExplorerResponse) {
    option (google.api.http) = {
      get: "/explorer"
      response_body: "data"
    };
  }

  // Finds recent matches by heroes played
  rpc GetFindMatches(GetFindMatchesRequest) returns (GetFindMatchesResponse) {
    option (google.api.http) = {
      get: "/findMatches"
      response_body: "data"
    };
  }

  // Get service health data
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse) {
    option (google.api.http) = {
      get: "/health"
      response_body: "data"
    };
  }

  // Get stats about hero performance in recent matches
  rpc GetHeroStats(GetHeroStatsRequest) returns (GetHeroStatsResponse) {
    option (google.api.http) = {
      get: "/heroStats"
      response_body: "data"
    };
  }

  // Get hero data
  rpc GetHeroes(GetHeroesRequest) returns (GetHeroesResponse) {
    option (google.api.http) = {
      get: "/heroes"
      response_body: "data"
    };
  }

  // Get hero performance over a range of match durations
  rpc GetHeroDurations(GetHeroDurationsRequest) returns (GetHeroDurationsResponse) {
    option (google.api.http) = {
      get: "/heroes/{hero_id}/durations"
      response_body: "data"
    };
  }

  // Get item popularity of hero categoried by start, early, mid and late game, analyzed from professional games
  rpc GetHeroItemPopularity(GetHeroItemPopularityRequest) returns (GetHeroItemPopularityResponse) {
    option (google.api.http) = {
      get: "/heroes/{hero_id}/itemPopularity"
      response_body: "data"
    };
  }

  // Get recent matches with a hero
  rpc GetHeroMatches(GetHeroMatchesRequest) returns (GetHeroMatchesResponse) {
    option (google.api.http) = {
      get: "/heroes/{hero_id}/matches"
      response_body: "data"
    };
  }

  // Get results against other heroes for a hero
  rpc GetHeroMatchups(GetHeroMatchupsRequest) returns (GetHeroMatchupsResponse) {
    option (google.api.http) = {
      get: "/heroes/{hero_id}/matchups"
      response_body: "data"
    };
  }

  // Get players who have played this hero
  rpc GetHeroPlayers(GetHeroPlayersRequest) returns (GetHeroPlayersResponse) {
    option (google.api.http) = {
      get: "/heroes/{hero_id}/players"
      response_body: "data"
    };
  }

  // Get league data
  rpc GetLeagues(GetLeaguesRequest) returns (GetLeaguesResponse) {
    option (google.api.http) = {
      get: "/leagues"
      response_body: "data"
    };
  }

  // Get data for a league
  rpc GetLeague(GetLeagueRequest) returns (GetLeagueResponse) {
    option (google.api.http) = {
      get: "/leagues/{league_id}"
      response_body: "data"
    };
  }

  // Get match IDs for a league (including amateur leagues)
  rpc GetLeagueMatchIds(GetLeagueMatchIdsRequest) returns (GetLeagueMatchIdsResponse) {
    option (google.api.http) = {
      get: "/leagues/{league_id}/matchIds"
      response_body: "data"
    };
  }

  // Get matches for a league (excluding amateur leagues)
  rpc GetLeagueMatches(GetLeagueMatchesRequest) returns (GetLeagueMatchesResponse) {
    option (google.api.http) = {
      get: "/leagues/{league_id}/matches"
      response_body: "data"
    };
  }

  // Get teams for a league
  rpc GetLeagueTeams(GetLeagueTeamsRequest) returns (GetLeagueTeamsResponse) {
    option (google.api.http) = {
      get: "/leagues/{league_id}/teams"
      response_body: "data"
    };
  }

  // Get top currently ongoing live games
  rpc GetLive(GetLiveRequest) returns (GetLiveResponse) {
    option (google.api.http) = {
      get: "/live"
      response_body: "data"
    };
  }

  // Match data
  rpc GetMatch(GetMatchRequest) returns (GetMatchResponse) {
    option (google.api.http) = {
      get: "/matches/{match_id}"
      response_body: "data"
    };
  }

  // Site metadata
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse) {
    option (google.api.http) = {
      get: "/metadata"
      response_body: "data"
    };
  }

  // Get list of parsed match IDs
  rpc GetParsedMatches(GetParsedMatchesRequest) returns (GetParsedMatchesResponse) {
    option (google.api.http) = {
      get: "/parsedMatches"
      response_body: "data"
    };
  }

  // Player data
  rpc GetPlayer(GetPlayerRequest) returns (GetPlayerResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}"
      response_body: "data"
    };
  }

  // Counts in categories
  rpc GetPlayerCounts(GetPlayerCountsRequest) returns (GetPlayerCountsResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/counts"
      response_body: "data"
    };
  }

  // Heroes played
  rpc GetPlayerHeroes(GetPlayerHeroesRequest) returns (GetPlayerHeroesResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/heroes"
      response_body: "data"
    };
  }

  // Distribution of matches in a single stat
  rpc GetPlayerHistogramsField(GetPlayerHistogramsFieldRequest) returns (GetPlayerHistogramsFieldResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/histograms/{field}"
      response_body: "data"
    };
  }

  // Matches played (full history, and supports column selection)
  rpc GetPlayerMatches(GetPlayerMatchesRequest) returns (GetPlayerMatchesResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/matches"
      response_body: "data"
    };
  }

  // Players played with
  rpc GetPlayerPeers(GetPlayerPeersRequest) returns (GetPlayerPeersResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/peers"
      response_body: "data"
    };
  }

  // Pro players played with
  rpc GetPlayerPros(GetPlayerProsRequest) returns (GetPlayerProsResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/pros"
      response_body: "data"
    };
  }

  // Player hero rankings
  rpc GetPlayerRankings(GetPlayerRankingsRequest) returns (GetPlayerRankingsResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/rankings"
      response_body: "data"
    };
  }

  // Returns a history of the player rank tier/medal changes (replaces MMR)
  rpc GetPlayerRatings(GetPlayerRatingsRequest) returns (GetPlayerRatingsResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/ratings"
      response_body: "data"
    };
  }

  // Recent matches played (limited number of results)
  rpc GetPlayerRecentMatches(GetPlayerRecentMatchesRequest) returns (GetPlayerRecentMatchesResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/recentMatches"
      response_body: "data"
    };
  }

  // Refresh player match history (up to 500), medal (rank), and profile name
  rpc PostPlayerRefresh(PostPlayerRefreshRequest) returns (PostPlayerRefreshResponse) {
    option (google.api.http) = {
      post: "/players/{account_id}/refresh"
      body: "body"
      response_body: "data"
    };
  }

  // Totals in stats
  rpc GetPlayerTotals(GetPlayerTotalsRequest) returns (GetPlayerTotalsResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/totals"
      response_body: "data"
    };
  }

  // Wards placed in matches played
  rpc GetPlayerWardmap(GetPlayerWardmapRequest) returns (GetPlayerWardmapResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/wardmap"
      response_body: "data"
    };
  }

  // Win/Loss count
  rpc GetPlayerWinLoss(GetPlayerWinLossRequest) returns (GetPlayerWinLossResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/wl"
      response_body: "data"
    };
  }

  // Words said/read in matches played
  rpc GetPlayerWordcloud(GetPlayerWordcloudRequest) returns (GetPlayerWordcloudResponse) {
    option (google.api.http) = {
      get: "/players/{account_id}/wordcloud"
      response_body: "data"
    };
  }

  // Get list of pro matches
  rpc GetProMatches(GetProMatchesRequest) returns (GetProMatchesResponse) {
    option (google.api.http) = {
      get: "/proMatches"
      response_body: "data"
    };
  }

  // Get list of pro players
  rpc GetProPlayers(GetProPlayersRequest) returns (GetProPlayersResponse) {
    option (google.api.http) = {
      get: "/proPlayers"
      response_body: "data"
    };
  }

  // Get list of randomly sampled public matches
  rpc GetPublicMatches(GetPublicMatchesRequest) returns (GetPublicMatchesResponse) {
    option (google.api.http) = {
      get: "/publicMatches"
      response_body: "data"
    };
  }

  // Top players by hero
  rpc GetRankings(GetRankingsRequest) returns (GetRankingsResponse) {
    option (google.api.http) = {
      get: "/rankings"
      response_body: "data"
    };
  }

  // Get top performances in a stat
  rpc GetRecordsField(GetRecordsFieldRequest) returns (GetRecordsFieldResponse) {
    option (google.api.http) = {
      get: "/records/{field}"
      response_body: "data"
    };
  }

  // Get parse request state
  rpc GetRequestJobId(GetRequestJobIdRequest) returns (GetRequestJobIdResponse) {
    option (google.api.http) = {
      get: "/request/{jobId}"
      response_body: "data"
    };
  }

  // Submit a new parse request. This call counts as 10 calls for rate limit (but not billing) purposes.
  rpc PostRequestMatchId(PostRequestMatchIdRequest) returns (PostRequestMatchIdResponse) {
    option (google.api.http) = {
      post: "/request/{match_id}"
      body: "body"
      response_body: "data"
    };
  }

  // Win rates for certain item timings on a hero for items that cost at least 1400 gold
  rpc GetScenariosItemTimings(GetScenariosItemTimingsRequest) returns (GetScenariosItemTimingsResponse) {
    option (google.api.http) = {
      get: "/scenarios/itemTimings"
      response_body: "data"
    };
  }

  // Win rates for heroes in certain lane roles
  rpc GetScenariosLaneRoles(GetScenariosLaneRolesRequest) returns (GetScenariosLaneRolesResponse) {
    option (google.api.http) = {
      get: "/scenarios/laneRoles"
      response_body: "data"
    };
  }

  // Miscellaneous team scenarios
  rpc GetScenariosMisc(GetScenariosMiscRequest) returns (GetScenariosMiscResponse) {
    option (google.api.http) = {
      get: "/scenarios/misc"
      response_body: "data"
    };
  }

  // Get database schema
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse) {
    option (google.api.http) = {
      get: "/schema"
      response_body: "data"
    };
  }

  // Search players by personaname.
  rpc SearchPlayers(SearchPlayersRequest) returns (SearchPlayersResponse) {
    option (google.api.http) = {
      get: "/search"
      response_body: "data"
    };
  }

  // Get team data
  rpc GetTeams(GetTeamsRequest) returns (GetTeamsResponse) {
    option (google.api.http) = {
      get: "/teams"
      response_body: "data"
    };
  }

  // Get data for a team
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse) {
    option (google.api.http) = {
      get: "/teams/{team_id}"
      response_body: "data"
    };
  }

  // Get heroes for a team
  rpc GetTeamHeroes(GetTeamHeroesRequest) returns (GetTeamHeroesResponse) {
    option (google.api.http) = {
      get: "/teams/{team_id}/heroes"
      response_body: "data"
    };
  }

  // Get matches for a team
  rpc GetTeamMatches(GetTeamMatchesRequest) returns (GetTeamMatchesResponse) {
    option (google.api.http) = {
      get: "/teams/{team_id}/matches"
      response_body: "data"
    };
  }

  // Get players who have played for a team
  rpc GetTeamPlayers(GetTeamPlayersRequest) returns (GetTeamPlayersResponse) {
    option (google.api.http) = {
      get: "/teams/{team_id}/players"
      response_body: "data"
    };
  }

  // Get list of highly ranked players
  rpc GetTopPlayers(GetTopPlayersRequest) returns (GetTopPlayersResponse) {
    option (google.api.http) = {
      get: "/topPlayers"
      response_body: "data"
    };
  }
}


// ─── Typed data messages from the OpenDota OpenAPI spec ───

message BenchmarksResponse {
  message Result {
    message GoldPerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message XpPerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message KillsPerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message LastHitsPerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message HeroDamagePerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message HeroHealingPerMinEntry {
      double percentile = 1;  // percentile
      double value = 2;  // value
    }

    message TowerDamageEntry {
      double percentile = 1;  // percentile
      int64 value = 2;  // value
    }

    repeated GoldPerMinEntry gold_per_min = 1;
    repeated XpPerMinEntry xp_per_min = 2;
    repeated KillsPerMinEntry kills_per_min = 3;
    repeated LastHitsPerMinEntry last_hits_per_min = 4;
    repeated HeroDamagePerMinEntry hero_damage_per_min = 5;
    repeated HeroHealingPerMinEntry hero_healing_per_min = 6;
    repeated TowerDamageEntry tower_damage = 7;
  }

  int64 hero_id = 1;  // The ID value of the hero played
  Result result = 2;  // result
}

message DistributionsResponse {
  message Ranks {
    message RowsEntry {
      int64 bin = 1;  // bin
      int64 bin_name = 2;  // bin_name
      int64 count = 3;  // count
      int64 cumulative_sum = 4;  // cumulative_sum
    }

    message Sum {
      int64 count = 1;  // count
    }

    repeated RowsEntry rows = 1;  // rows
    Sum sum = 2;  // sum
  }

  Ranks ranks = 1;  // ranks
}

message HeroDurationsResponse {
  string duration_bin = 1;  // Lower bound of number of seconds the match lasted
  int64 games_played = 2;  // Number of games played
  int64 wins = 3;  // Number of wins
}

message HeroItemPopularityResponse {
  message StartGameItems {
    int64 item = 1;  // Number of item bought
  }

  message EarlyGameItems {
    int64 item = 1;  // Number of item bought
  }

  message MidGameItems {
    int64 item = 1;  // Number of item bought
  }

  message LateGameItems {
    int64 item = 1;  // Number of item bought
  }

  StartGameItems start_game_items = 1;  // Items bought before game started
  EarlyGameItems early_game_items = 2;  // Items bought in the first 10 min of the game, with cost at least 700
  MidGameItems mid_game_items = 3;  // Items bought between 10 and 25 min of the game, with cost at least 2000
  LateGameItems late_game_items = 4;  // Items bought at least 25 min after game started, with cost at least 4000
}

message HeroMatchupsResponse {
  int64 hero_id = 1;  // The ID value of the hero played
  int64 games_played = 2;  // Number of games played
  int64 wins = 3;  // Number of games won
}

message HeroObjectResponse {
  int64 id = 1;  // The ID value of the hero played
  string name = 2;  // Dota hero command name
  string localized_name = 3;  // Hero name
  string primary_attr = 4;  // Hero primary shorthand attribute name, e.g. 'agi'
  string attack_type = 5;  // Hero attack type, either 'Melee' or 'Ranged'
  repeated string roles = 6;
}

message HeroStatsResponse {
  int64 id = 1;  // The ID value of the hero played
  string name = 2;  // Dota hero command name
  string localized_name = 3;  // Hero name
  string primary_attr = 4;  // primary_attr
  string attack_type = 5;  // attack_type
  repeated string roles = 6;  // roles
  string img = 7;  // img
  string icon = 8;  // icon
  int64 base_health = 9;  // base_health
  double base_health_regen = 10;  // base_health_regen
  int64 base_mana = 11;  // base_mana
  int64 base_mana_regen = 12;  // base_mana_regen
  int64 base_armor = 13;  // base_armor
  int64 base_mr = 14;  // base_mr
  int64 base_attack_min = 15;  // base_attack_min
  int64 base_attack_max = 16;  // base_attack_max
  int64 base_str = 17;  // base_str
  int64 base_agi = 18;  // base_agi
  int64 base_int = 19;  // base_int
  double str_gain = 20;  // str_gain
  double agi_gain = 21;  // agi_gain
  double int_gain = 22;  // int_gain
  int64 attack_range = 23;  // attack_range
  int64 projectile_speed = 24;  // projectile_speed
  double attack_rate = 25;  // attack_rate
  int64 base_attack_time = 26;  // base_attack_time
  double attack_point = 27;  // attack_point
  int64 move_speed = 28;  // move_speed
  double turn_rate = 29;  // turn_rate
  bool cm_enabled = 30;  // cm_enabled
  int64 legs = 31;  // legs
  int64 day_vision = 32;  // day_vision
  int64 night_vision = 33;  // night_vision
  int64 hero_id = 34;  // The ID value of the hero played
  int64 turbo_picks = 35;  // Picks in Turbo mode this month
  int64 turbo_wins = 36;  // Wins in Turbo mode this month
  int64 pro_ban = 37;  // pro_ban
  int64 pro_win = 38;  // pro_win
  int64 pro_pick = 39;  // pro_pick
  int64 rank_1_pick = 40 [json_name = "1_pick"];  // Herald picks
  int64 rank_1_win = 41 [json_name = "1_win"];  // Herald wins
  int64 rank_2_pick = 42 [json_name = "2_pick"];  // Guardian picks
  int64 rank_2_win = 43 [json_name = "2_win"];  // Guardian wins
  int64 rank_3_pick = 44 [json_name = "3_pick"];  // Crusader picks
  int64 rank_3_win = 45 [json_name = "3_win"];  // Crusader wins
  int64 rank_4_pick = 46 [json_name = "4_pick"];  // Archon picks
  int64 rank_4_win = 47 [json_name = "4_win"];  // Archon wins
  int64 rank_5_pick = 48 [json_name = "5_pick"];  // Legend picks
  int64 rank_5_win = 49 [json_name = "5_win"];  // Legend wins
  int64 rank_6_pick = 50 [json_name = "6_pick"];  // Ancient picks
  int64 rank_6_win = 51 [json_name = "6_win"];  // Ancient wins
  int64 rank_7_pick = 52 [json_name = "7_pick"];  // Divine picks
  int64 rank_7_win = 53 [json_name = "7_win"];  // Divine wins
  int64 rank_8_pick = 54 [json_name = "8_pick"];  // Immortal picks
  int64 rank_8_win = 55 [json_name = "8_win"];  // Immortal wins
}

message LeagueObjectResponse {
  int64 leagueid = 1;  // leagueid
  string ticket = 2;  // ticket
  string banner = 3;  // banner
  string tier = 4;  // tier
  string name = 5;  // League name
}

message MatchObjectResponse {
  int64 match_id = 1;  // The ID number of the match assigned by Valve
  int64 duration = 2;  // Duration of the game in seconds
  int64 start_time = 3;  // The Unix timestamp at which the game started
  int64 radiant_team_id = 4;  // The Radiant's team_id
  string radiant_name = 5;  // The Radiant's team name
  int64 dire_team_id = 6;  // The Dire's team_id
  string dire_name = 7;  // The Dire's team name
  int64 leagueid = 8;  // Identifier for the league the match took place in
  string league_name = 9;  // Name of league the match took place in
  int64 series_id = 10;  // Identifier for the series of the match
  int64 series_type = 11;  // Type of series the match was
  int64 radiant_score = 12;  // Number of kills the Radiant team had when the match ended
  int64 dire_score = 13;  // Number of kills the Dire team had when the match ended
  bool radiant_win = 14;  // Boolean indicating whether Radiant won the match
  bool radiant = 15;  // Whether the team/player/hero was on Radiant
}

message MatchResponse {
  message ChatEntry {
    int64 time = 1;  // Time in seconds at which the message was said
    string unit = 2;  // Name of the player who sent the message
    string key = 3;  // The message the player sent
    int64 slot = 4;  // slot
    int64 player_slot = 5;  // Which slot the player is in. 0-127 are Radiant, 128-255 are Dire
  }

  message DraftTimingsEntry {
    int64 order = 1;  // order
    bool pick = 2;  // pick
    int64 active_team = 3;  // active_team
    int64 hero_id = 4;  // The ID value of the hero played
    int64 player_slot = 5;  // Which slot the player is in. 0-127 are Radiant, 128-255 are Dire
    int64 extra_time = 6;  // extra_time
    int64 total_time_taken = 7;  // total_time_taken
  }

  message PicksBansEntry {
    bool is_pick = 1;  // Boolean indicating whether the choice is a pick or a ban
    int64 hero_id = 2;  // The ID value of the hero played
    int64 team = 3;  // The team that picked or banned the hero
    int64 order = 4;  // The order of the pick or ban
  }

  message PlayersEntry {
    message BuybackLogEntry {
      int64 time = 1;  // Time in seconds the buyback occurred
      int64 slot = 2;  // slot
      int64 player_slot = 3;  // Which slot the player is in. 0-127 are Radiant, 128-255 are Dire
    }

    message ConnectionLogEntry {
      int64 time = 1;  // Game time in seconds the event ocurred
      string event = 2;  // Event that occurred
      int64 player_slot = 3;  // Which slot the player is in. 0-127 are Radiant, 128-255 are Dire
    }

    message KillsLogEntry {
      int64 time = 1;  // Time in seconds the player killed the hero
      string key = 2;  // Hero killed
    }

    message PurchaseLogEntry {
      int64 time = 1;  // Time in seconds the item was bought
      string key = 2;  // String item ID
      int64 charges = 3;  // Integer amount of charges
    }

    message RunesLogEntry {
      int64 time = 1;  // Time in seconds rune picked up
      int64 key = 2;  // key
    }

    message CosmeticsEntry {
      int64 item_id = 1;
      string name = 2;  // name
      string prefab = 3;
      string creation_date = 4;
      string image_inventory = 5;
      string image_path = 6;
      string item_description = 7;
      string item_name = 8;
      string item_rarity = 9;
      string item_type_name = 10;
      string used_by_heroes = 11;
    }

    message NeutralTokensLogEntry {
      int64 time = 1;  // Time in seconds at which the token was dropped
      string key = 2;  // Type of token dropped
    }

    message NeutralItemHistoryEntry {
      int64 time = 1;  // Time in seconds at which the item was crafted
      string item_neutral = 2;  // Neutral item name
      string item_neutral_enhancement = 3;  // Neutral enhancement name
    }

    int64 match_id = 1;  // The ID number of the match assigned by Valve
    int64 player_slot = 2;  // Which slot the player is in. 0-127 are Radiant, 128-255 are Dire
    repeated int64 ability_upgrades_arr = 3;  // An array describing how abilities were upgraded
    google.protobuf.Struct ability_uses = 4;  // Object containing information on how many times the played used their abilities
    google.protobuf.Struct ability_targets = 5;  // Object containing information on who the player used their abilities on
    google.protobuf.Struct damage_targets = 6;  // Object containing information on how and how much damage the player dealt to other heroes
    int64 account_id = 7;  // The player account ID
    google.protobuf.Struct actions = 8;  // Object containing information on how many and what type of actions the player issued to their hero
    repeated google.protobuf.Struct additional_units = 9;  // Object containing information on additional units the player had under their control
    int64 assists = 10;  // Number of assists the player had
