  int64 start_time = 2;  // The Unix timestamp at which the game started
  int64 hero_id = 3;  // The ID value of the hero played
  int64 score = 4;  // Record score
}

message ScenarioItemTimingsResponse {
  int64 hero_id = 1;  // The ID value of the hero played
  string item = 2;  // Purchased item
  int64 time = 3;  // Ingame time in seconds before the item was purchased
  string games = 4;  // The number of games where the hero bought this item before this time
  string wins = 5;  // The number of games won where the hero bought this item before this time
}

message ScenarioLaneRolesResponse {
  int64 hero_id = 1;  // The ID value of the hero played
  int64 lane_role = 2;  // The hero's lane role
  int64 time = 3;  // Maximum game length in seconds
  string games = 4;  // The number of games where the hero played in this lane role
  string wins = 5;  // The number of games won where the hero played in this lane role
}

message ScenarioMiscResponse {
  string scenario = 1;  // The scenario's name or description
  bool is_radiant = 2;  // Boolean indicating whether Radiant executed this scenario
  int64 region = 3;  // Region the game was played in
  string games = 4;  // The number of games where this scenario occurred
  string wins = 5;  // The number of games won where this scenario occured
}

message SchemaResponse {
  string table_name = 1;  // table_name
  string column_name = 2;  // column_name
  string data_type = 3;  // data_type
}

message SearchResponse {
  int64 account_id = 1;  // The player account ID
  string avatarfull = 2;  // avatarfull
  string personaname = 3;  // Player's Steam name
  string last_match_time = 4;  // last_match_time. May not be present or null.
  double similarity = 5;  // similarity
}

message TeamHeroesResponse {
  int64 hero_id = 1;  // The ID value of the hero played
  string name = 2;  // Hero name
  int64 games_played = 3;  // Number of games played
  int64 wins = 4;  // Number of wins
}

message TeamMatchObjectResponse {
  int64 match_id = 1;  // The ID number of the match assigned by Valve
  bool radiant = 2;  // Whether the team/player/hero was on Radiant
  bool radiant_win = 3;  // Boolean indicating whether Radiant won the match
  int64 radiant_score = 4;  // Number of kills the Radiant team had when the match ended
  int64 dire_score = 5;  // Number of kills the Dire team had when the match ended
  int64 duration = 6;  // Duration of the game in seconds
  int64 start_time = 7;  // The Unix timestamp at which the game started
  int64 leagueid = 8;  // Identifier for the league the match took place in
  string league_name = 9;  // Name of league the match took place in
  int64 cluster = 10;  // cluster
  int64 opposing_team_id = 11;  // Opposing team identifier
  string opposing_team_name = 12;  // Opposing team name, e.g. 'Evil Geniuses'
  string opposing_team_logo = 13;  // Opposing team logo url
}

message TeamObjectResponse {
  int64 team_id = 1;  // Team's identifier
  double rating = 2;  // The Elo rating of the team
  int64 wins = 3;  // The number of games won by this team
  int64 losses = 4;  // The number of losses by this team
  int64 last_match_time = 5;  // The Unix timestamp of the last match played by this team
  string name = 6;  // Team name
  string tag = 7;  // The team tag/abbreviation
}

message TeamPlayersResponse {
  int64 account_id = 1;  // The player account ID
  string name = 2;  // name
  int64 games_played = 3;  // Number of games played
  int64 wins = 4;  // Number of wins
  bool is_current_team_member = 5;  // If this player is on the current roster
}

