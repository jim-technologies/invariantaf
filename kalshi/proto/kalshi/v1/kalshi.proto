message GetHistoricalCutoffData {
  // Cutoff based on **market settlement time**. Markets and their candlesticks that settled before this timestamp must be accessed via `GET /historical/markets` and `GET /historical/markets/{ticker}/candlesticks`.
  string market_settled_ts = 1;
  // Cutoff based on **trade fill time**. Fills that occurred before this timestamp must be accessed via `GET /historical/fills`.
  string trades_created_ts = 2;
  // Cutoff based on **order cancellation or execution time**. Orders canceled or fully executed before this timestamp must be accessed via `GET /historical/orders`. Resting (active) orders are always available in `GET /portfolio/orders`.
  string orders_updated_ts = 3;
}

message BidAskDistributionHistorical {
  // Offer price on the market at the start of the candlestick period (in dollars).
  string open = 1;
  // Lowest offer price on the market during the candlestick period (in dollars).
  string low = 2;
  // Highest offer price on the market during the candlestick period (in dollars).
  string high = 3;
  // Offer price on the market at the end of the candlestick period (in dollars).
  string close = 4;
}

message PriceDistributionHistorical {
  // Price of the first trade during the candlestick period (in dollars). Null if no trades occurred.
  google.protobuf.Value open = 1;
  // Lowest trade price during the candlestick period (in dollars). Null if no trades occurred.
  google.protobuf.Value low = 2;
  // Highest trade price during the candlestick period (in dollars). Null if no trades occurred.
  google.protobuf.Value high = 3;
  // Price of the last trade during the candlestick period (in dollars). Null if no trades occurred.
  google.protobuf.Value close = 4;
  // Volume-weighted average price during the candlestick period (in dollars). Null if no trades occurred.
  google.protobuf.Value mean = 5;
  // Close price from the previous candlestick period (in dollars). Null if this is the first candlestick or no prior trade exists.
  google.protobuf.Value previous = 6;
}

message MarketCandlestickHistorical {
  // Unix timestamp for the inclusive end of the candlestick period.
  int64 end_period_ts = 1;
  // Open, high, low, close (OHLC) data for YES buy offers on the market during the candlestick period.
  BidAskDistributionHistorical yes_bid = 2;
  // Open, high, low, close (OHLC) data for YES sell offers on the market during the candlestick period.
  BidAskDistributionHistorical yes_ask = 3;
  // Open, high, low, close (OHLC) and more data for trade YES contract prices on the market during the candlestick period.
  PriceDistributionHistorical price = 4;
  // String representation of the number of contracts bought on the market during the candlestick period.
  string volume = 5;
  // String representation of the number of contracts bought on the market by end of the candlestick period (end_period_ts).
  string open_interest = 6;
}

message GetMarketCandlesticksHistoricalData {
  // Unique identifier for the market.
  string ticker = 1;
  // Array of candlestick data points for the specified time range.
  repeated MarketCandlestickHistorical candlesticks = 2;
}

message Fill {
  // Unique identifier for this fill
  string fill_id = 1;
  // Unique identifier for this fill (legacy field name, same as fill_id)
  string trade_id = 2;
  // Unique identifier for the order that resulted in this fill
  string order_id = 3;
  // Client-provided identifier for the order that resulted in this fill
  string client_order_id = 4;
  // Unique identifier for the market
  string ticker = 5;
  // Unique identifier for the market (legacy field name, same as ticker)
  string market_ticker = 6;
  // Specifies if this is a 'yes' or 'no' fill
  string side = 7;
  // Specifies if this is a buy or sell order
  string action = 8;
  // Number of contracts bought or sold in this fill
  int64 count = 9;
  // String representation of the number of contracts bought or sold in this fill
  string count_fp = 10;
  // Fill price (deprecated - use yes_price or no_price)
  double price = 11;
  // Fill price for the yes side in cents
  int64 yes_price = 12;
  // Fill price for the no side in cents
  int64 no_price = 13;
  // Fill price for the yes side in fixed point dollars
  string yes_price_fixed = 14;
  // Fill price for the no side in fixed point dollars
  string no_price_fixed = 15;
  // If true, this fill was a taker (removed liquidity from the order book)
  bool is_taker = 16;
  // Timestamp when this fill was executed
  string created_time = 17;
  // Fee cost in centi-cents
  string fee_cost = 18;
  // Subaccount number (0 for primary, 1-32 for subaccounts). Present for direct users.
  int64 subaccount_number = 19;
  // Unix timestamp when this fill was executed (legacy field name)
