  string cursor = 1;
  // Event ticker to filter by. Only a single event ticker is supported.
  string event_ticker = 2;
  // Filter by market ticker
  string market_ticker = 3;
  // Subaccount number (0 for primary, 1-32 for subaccounts). If omitted, defaults to all subaccounts.
  int64 subaccount = 4;
  // Parameter to specify the number of results per page. Defaults to 100.
  int32 limit = 5;
  // Filter RFQs by status
  string status = 6;
  // Filter RFQs by creator user ID
  string creator_user_id = 7;
}

message GetRFQsResponse {
  // Response payload.
  GetRFQsData data = 1;
}

