  // Market ticker
  string ticker = 1;
}

message GetMarketResponse {
  // Response payload.
  GetMarketData data = 1;
}

message BatchGetMarketCandlesticksRequest {
  // Comma-separated list of market tickers (maximum 100)
  string market_tickers = 1;
  // Start timestamp in Unix seconds
  int64 start_ts = 2;
  // End timestamp in Unix seconds
  int64 end_ts = 3;
  // Candlestick period interval in minutes
  int32 period_interval = 4;
  // If true, prepends the latest candlestick available before the start_ts. This synthetic candlestick is created by:
  bool include_latest_before_start = 5;
}

message BatchGetMarketCandlesticksResponse {
  // Response payload.
  BatchGetMarketCandlesticksData data = 1;
}
