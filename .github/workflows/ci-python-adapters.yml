name: CI Python Adapters

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - alpaca
          - alphavantage
          - alternativeme
          - arxiv
          - balldontlie
          - beefy
          - binance
          - birdeye
          - bitget
          - bls
          - bravesearch
          - cocktaildb
          - coingecko
          - coinglass
          - coinmarketcal
          - coinpaprika
          - compound
          - cryptodotcom
          - cryptocompare
          - curve
          - defillama
          - deribit
          - dexscreener
          - dune
          - dydx
          - etherscan
          - exchangerate
          - finnhub
          - footballdata
          - fred
          - fun
          - gateio
          - geckoterminal
          - geminipredictions
          - github
          - hackernews
          - hyperliquid
          - jupiter
          - kraken
          - kucoin
          - lichess
          - lido
          - lifi
          - marinade
          - morpho
          - nasa
          - nhl
          - nws
          - oneinch
          - openmeteo
          - openlibrary
          - openweathermap
          - orca
          - packageregistry
          - pandascore
          - pokeapi
          - polling
          - reddit
          - secedgar
          - solscan
          - spacex
          - stratz
          - tmdb
          - twelvedata
          - usgs
          - wikimedia
          - wikipedia
          - xkcd
          - yearn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('.flox/env/manifest.lock', '.flox/env/manifest.toml') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.adapter }}-${{ hashFiles(format('{0}/uv.lock', matrix.adapter), format('{0}/pyproject.toml', matrix.adapter)) }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.adapter }}-
            uv-${{ runner.os }}-

      - uses: flox/install-flox-action@v2
      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} lint

  test:
    name: test (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        adapter:
          - aave
          - alternativeme
          - arxiv
          - balldontlie
          - binance
          - birdeye
          - bitget
          - bls
          - bravesearch
          - bybit
          - cocktaildb
          - coinglass
          - coinmarketcal
          - coinpaprika
          - compound
          - cryptodotcom
          - cryptocompare
          - curve
          - defillama
          - deribit
          - dexscreener
          - dune
          - dydx
          - etherscan
          - exchangerate
          - footballdata
          - fred
          - fun
          - gateio
          - geckoterminal
          - geminipredictions
          - hackernews
          - hyperliquid
          - jsonplaceholder
          - jupiter
          - kalshi
          - kraken
          - kucoin
          - lido
          - lifi
          - manifold
          - marinade
          - morpho
          - nhl
          - nws
          - oneinch
          - opendota
          - openlibrary
          - openmeteo
          - openweathermap
          - opinion
          - orca
          - packageregistry
          - pandascore
          - pokeapi
          - polling
          - polymarket
          - reddit
          - secedgar
          - solscan
          - spacex
          - twelvedata
          - usgs
          - wikimedia
          - wikipedia
          - xkcd
          - yearn
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('.flox/env/manifest.lock', '.flox/env/manifest.toml') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.adapter }}-${{ hashFiles(format('{0}/uv.lock', matrix.adapter), format('{0}/pyproject.toml', matrix.adapter)) }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.adapter }}-
            uv-${{ runner.os }}-

      - uses: flox/install-flox-action@v2
      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} test
