name: CI Python Adapters

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - alpaca
          - alphavantage
          - arxiv
          - bybit
          - cocktaildb
          - coingecko
          - defillama
          - exchangerate
          - finnhub
          - fred
          - fun
          - github
          - hackernews
          - hyperliquid
          - kalshi
          - kraken
          - lichess
          - nasa
          - opendota
          - openlibrary
          - openweathermap
          - packageregistry
          - pokeapi
          - polymarket
          - jsonplaceholder
          - reddit
          - secedgar
          - spacex
          - stratz
          - tmdb
          - wikipedia
          - xkcd
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('.flox/env/manifest.lock', '.flox/env/manifest.toml') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.adapter }}-${{ hashFiles(format('{0}/uv.lock', matrix.adapter), format('{0}/pyproject.toml', matrix.adapter)) }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.adapter }}-
            uv-${{ runner.os }}-

      - uses: flox/install-flox-action@v2
      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} lint

  test:
    name: test (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        adapter:
          - arxiv
          - bybit
          - cocktaildb
          - defillama
          - exchangerate
          - fred
          - fun
          - hackernews
          - hyperliquid
          - kalshi
          - kraken
          - opendota
          - openlibrary
          - openweathermap
          - packageregistry
          - pokeapi
          - polymarket
          - jsonplaceholder
          - reddit
          - secedgar
          - spacex
          - wikipedia
          - xkcd
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('.flox/env/manifest.lock', '.flox/env/manifest.toml') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.adapter }}-${{ hashFiles(format('{0}/uv.lock', matrix.adapter), format('{0}/pyproject.toml', matrix.adapter)) }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.adapter }}-
            uv-${{ runner.os }}-

      - uses: flox/install-flox-action@v2
      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} test
