name: CI Go Adapters

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: lint+test (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter:
          - across
          - aevo
          - alternativeme
          - bravesearch
          - coinbase
          - coinpaprika
          - cryptocompare
          - cryptodotcom
          - cryptosignal
          - dockerhub
          - drift
          - geminipredictions
          - giphy
          - gmx
          - googlesheets
          - jito
          - noaa
          - okx
          - opendota
          - openmeteo
          - pandascore
          - pendle
          - polymarket
          - predictfun
          - quicknode
          - raydium
          - stackexchange
          - steam
          - temporal
          - theoddsapi
          - uniswap
          - unsplash
          - usgovdata
          - venus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('.flox/env/manifest.lock', '.flox/env/manifest.toml') }}
          restore-keys: nix-${{ runner.os }}-

      - uses: flox/install-flox-action@v2
      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} lint

      - uses: flox/activate-action@v1
        with:
          command: make -C ${{ matrix.adapter }} test
