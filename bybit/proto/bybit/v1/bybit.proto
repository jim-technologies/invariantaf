message BybitResponse {
  optional int64 retCode = 1;
  string retMsg = 2;
  google.protobuf.Value result = 3;
  google.protobuf.Value retExtInfo = 4;
  optional int64 time = 5;
}

message AccountAccountInfoRequest {
}

message AccountBorrowHistoryRequest {
  // e.g., USDC, USDT, BTC, ETH
  optional string currency = 1;
  // The start timestamp (ms)
  optional int64 startTime = 2;
  // The end timestamp (ms)
  optional int64 endTime = 3;
  // Limit per page. 1-50
  optional int64 limit = 4;
  // Cusor, used for pagiation
  optional string cursor = 5;
}

message AccountCoinGreeksRequest {
  // Base coin
  optional string baseCoin = 1;
}

message AccountCollateralInfoRequest {
  // Collateral asset
  optional string currency = 1;
}

message AccountFeeRateRequest {
  // Product type. working for spot and option
  string category = 1;
  // Symbol name. valid for linear,inverse and spot
  optional string symbol = 2;
  // Base coin. Valid for option
  optional string baseCoin = 3;
}

message AccountSetCollateralRequest {
  // Request body
  AccountSetCollateralRequestBody body = 1;
}

message AccountSetCollateralRequestBody {
  // coin
  string coin = 1;
  // coin
  string collateralSwitch = 2;
}

message AccountSetMarginModeRequest {
  // Request body
  AccountSetMarginModeRequestBody body = 1;
}

message AccountSetMarginModeRequestBody {
  // Margin mode
  string setMarginMode = 1;
}

message AccountSetSpotHedgeRequest {
  // Request body
  AccountSetSpotHedgeRequestBody body = 1;
}

message AccountSetSpotHedgeRequestBody {
  // on or off spot hedging mode
  string setHedgingMode = 1;
}

message AccountTransactionLogRequest {
  // Support `UNIFIED` for now
  optional string accountType = 1;
  // Product category
  optional string category = 2;
  // Currency
  optional string currency = 3;
  // Base coin
  optional string baseCoin = 4;
  // Transaction log type
  optional string type = 5;
  // The start timestamp (ms)
  optional int64 startTime = 6;
  // The end timestamp (ms)
  optional int64 endTime = 7;
  // Limit size for each page. 1-50
  optional int64 limit = 8;
  // Cursor, used for pagination
  optional string cursor = 9;
}

message AccountUpgradeUnifiedAccountRequest {
  // Request body
  google.protobuf.Struct body = 1;
}

message AccountWalletRequest {
  // Account type
  string accountType = 1;
  // Coin name. You can pass mutiple coins like USDT,USDC
  optional string coin = 2;
}

message AssetAccountCoinBalanceRequest {
  // If query sub user balance, please input sub uid
  optional string memberId = 1;
  // Account type
  string accountType = 2;
  // Coin name
  string coin = 3;
  // Query bonus or not. 0=false, 1=true
  optional int64 withBonus = 4;
  // Whether query delay withdraw/transfer safe amount. 0：false, 1；true
  optional int64 withTransferSafeAmount = 5;
}

message AssetAllBalanceRequest {
  // If query sub user balance, please input sub uid
  optional string memberId = 1;
  // Account type
  string accountType = 2;
  // Coin name
  optional string coin = 3;
  // Query bonus or not. 0=false, 1=true
  optional int64 withBonus = 4;
}

message AssetAssetInfoRequest {
  // Account type
  string accountType = 1;
  // Coin name
  optional string coin = 2;
}

message AssetCoinInfoRequest {
  // Coin name
  optional string coin = 1;
}

message AssetCreateInterTransferRequest {
  // Request body
  AssetCreateInterTransferRequestBody body = 1;
}

message AssetCreateInterTransferRequestBody {
  // UUID
  string transferId = 1;
  // Coin
  string coin = 2;
  // Amount
  string amount = 3;
  // From account type
  string fromAccountType = 4;
  // To account type
  string toAccountType = 5;
}

message AssetDeliveryRequest {
  // Product type
  string category = 1;
  // Symbol name
  optional string symbol = 2;
  // expired date
  optional string expDate = 3;
  // 1-50. max 50
  optional int64 limit = 4;
  // cursor, used for pagination
  optional string cursor = 5;
}

message AssetDepositCoinSpecRequest {
  // Coin name. coin and chain must be paired if passed
  optional string coin = 1;
  // Chain name. coin and chain must be paired if passed
  optional string chain = 2;
  // Limit size. 1-35
  optional int64 limit = 3;
  // Cursor, used for pagination
  optional string cursor = 4;
}

message AssetDepositRecordRequest {
  // Coin name
  optional string coin = 1;
  // The start timestamp (ms)
  optional int64 startTime = 2;
  // The end timestamp (ms)
  optional int64 endTime = 3;
  // Limit size. 1-50
  optional int64 limit = 4;
  // Cursor, used to pagination
  optional string cursor = 5;
}

message AssetExchangeRequest {
  // From coin
  optional string fromCoin = 1;
  // To coin
  optional string toCoin = 2;
  // Limit size. 1-50
  int64 limit = 3;
  // Cursor, used for pagination
  optional string cursor = 4;
}

message AssetInterTransferListRequest {
  // Transfer id
  optional string transferId = 1;
  // Coin name
  optional string coin = 2;
  // Status
  optional string status = 3;
  // The start timestamp (ms)
  optional int64 startTime = 4;
  // The end timestamp (ms)
  optional int64 endTime = 5;
  // Limit size. 1-50
  optional int64 limit = 6;
  // Cursor, used for pagination
  optional string cursor = 7;
}

message AssetInternalDepositRecordRequest {
  // Coin name
  optional string coin = 1;
  // The start timestamp (ms)
  optional int64 startTime = 2;
  // The end timestamp (ms)
  optional int64 endTime = 3;
  // Limit size. 1-50
  optional int64 limit = 4;
  // Cursor, used for pagination
  optional string cursor = 5;
}

message AssetMasterDepositAddrRequest {
  // Coin name
  string coin = 1;
  // Chain name
  optional string chainType = 2;
}

message AssetSetDepositAcctRequest {
  // Request body
  AssetSetDepositAcctRequestBody body = 1;
}

message AssetSetDepositAcctRequestBody {
  // From account type
  string AccountType = 1;
}

message AssetSettlementRequest {
  // Product type
