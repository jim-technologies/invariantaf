syntax = "proto3";

package bybit.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

// Bybit V5 API (explorer subset) projected as protocol-agnostic RPC tools.
// Generated from openapi/v5/*.yaml.

service BybitAccountService {
  // Get Wallet Balance
  rpc Wallet(AccountWalletRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/wallet-balance"
    };
  }

  // Upgrade to Unified Account
  rpc UpgradeUnifiedAccount(AccountUpgradeUnifiedAccountRequest) returns (BybitResponse) {
    option (google.api.http) = {
      post: "/v5/account/upgrade-to-uta"
      body: "body"
    };
  }

  // Set Collateral Coin
  rpc SetCollateral(AccountSetCollateralRequest) returns (BybitResponse) {
    option (google.api.http) = {
      post: "/v5/account/set-collateral-switch"
      body: "body"
    };
  }

  // Get Borrow History
  rpc BorrowHistory(AccountBorrowHistoryRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/borrow-history"
    };
  }

  // Get Collateral Info
  rpc CollateralInfo(AccountCollateralInfoRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/collateral-info"
    };
  }

  // Get Coin Greeks
  rpc CoinGreeks(AccountCoinGreeksRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/coin-greeks"
    };
  }

  // Get Fee Rate
  rpc FeeRate(AccountFeeRateRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/fee-rate"
    };
  }

  // Get Account Info
  rpc AccountInfo(AccountAccountInfoRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/info"
    };
  }

  // Get Transaction Log
  rpc TransactionLog(AccountTransactionLogRequest) returns (BybitResponse) {
    option (google.api.http) = {
      get: "/v5/account/transaction-log"
    };
  }

  // Set Margin Mode
  rpc SetMarginMode(AccountSetMarginModeRequest) returns (BybitResponse) {
    option (google.api.http) = {
      post: "/v5/account/set-margin-mode"
      body: "body"
    };
  }

  // Set Spot Hedging
  rpc SetSpotHedge(AccountSetSpotHedgeRequest) returns (BybitResponse) {
    option (google.api.http) = {
      post: "/v5/account/set-hedging-mode"
      body: "body"
    };
  }

}

