syntax = "proto3";

package quicknode.v1;

option go_package = "github.com/jim-technologies/invariantaf/quicknode/quicknode/v1";

// QuickNode Console API. Manage RPC endpoints, view billing, usage metrics,
// rate limits, security settings, and supported chains. Requires
// QUICKNODE_API_KEY with CONSOLE_REST permission.
service QuickNodeConsoleService {
  // List all supported blockchain chains and networks.
  rpc ListChains(ListChainsRequest) returns (ListChainsResponse);

  // List all RPC endpoints in the account.
  rpc ListEndpoints(ListEndpointsRequest) returns (ListEndpointsResponse);

  // Create a new RPC endpoint for a specific chain and network.
  rpc CreateEndpoint(CreateEndpointRequest) returns (Endpoint);

  // Get details of a specific RPC endpoint by ID.
  rpc GetEndpoint(GetEndpointRequest) returns (Endpoint);

  // Update an existing RPC endpoint (name, add-ons).
  rpc UpdateEndpoint(UpdateEndpointRequest) returns (Endpoint);

  // Delete (archive) an RPC endpoint by ID.
  rpc DeleteEndpoint(DeleteEndpointRequest) returns (DeleteEndpointResponse);

  // Pause or unpause an RPC endpoint.
  rpc UpdateEndpointStatus(UpdateEndpointStatusRequest) returns (Endpoint);

  // Get performance metrics for an endpoint (method calls, response times, status breakdowns).
  rpc GetEndpointMetrics(GetEndpointMetricsRequest) returns (GetEndpointMetricsResponse);

  // Get request logs for an endpoint within a time range.
  rpc GetEndpointLogs(GetEndpointLogsRequest) returns (GetEndpointLogsResponse);

  // Get detailed information about a specific logged request.
  rpc GetEndpointLogDetails(GetEndpointLogDetailsRequest) returns (LogDetail);

  // Get total RPC usage within a time range.
  rpc GetRPCUsage(GetRPCUsageRequest) returns (GetRPCUsageResponse);

  // Get RPC usage broken down by individual endpoint.
  rpc GetRPCUsageByEndpoint(GetRPCUsageRequest) returns (GetRPCUsageByEndpointResponse);

  // Get RPC usage broken down by RPC method.
  rpc GetRPCUsageByMethod(GetRPCUsageRequest) returns (GetRPCUsageByMethodResponse);

  // Get RPC usage broken down by blockchain network.
  rpc GetRPCUsageByChain(GetRPCUsageRequest) returns (GetRPCUsageByChainResponse);

  // List billing invoices.
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);

  // List billing payments.
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);

  // Get method-level rate limits for an endpoint.
  rpc GetMethodRateLimits(GetMethodRateLimitsRequest) returns (GetMethodRateLimitsResponse);

  // Update global rate limits (requests per second/minute/day) for an endpoint.
  rpc UpdateRateLimits(UpdateRateLimitsRequest) returns (UpdateRateLimitsResponse);

  // Create a method-level rate limit for an endpoint.
  rpc CreateMethodRateLimit(CreateMethodRateLimitRequest) returns (MethodRateLimit);

  // Update a method-level rate limit.
  rpc UpdateMethodRateLimit(UpdateMethodRateLimitRequest) returns (MethodRateLimit);

  // Delete a method-level rate limit.
  rpc DeleteMethodRateLimit(DeleteMethodRateLimitRequest) returns (DeleteMethodRateLimitResponse);

  // Get security options for an endpoint (token auth, JWT, IP allowlist, referrer, domain mask).
  rpc GetSecurityOptions(GetSecurityOptionsRequest) returns (SecurityOptions);

  // Update security options for an endpoint.
  rpc UpdateSecurityOptions(UpdateSecurityOptionsRequest) returns (SecurityOptions);

  // Create a domain mask for an endpoint.
  rpc CreateDomainMask(CreateDomainMaskRequest) returns (DomainMask);

  // Add an IP address to the endpoint allowlist.
  rpc CreateIPAllowlist(CreateIPAllowlistRequest) returns (IPAllowlistEntry);

  // Create a JWT authentication token for an endpoint.
  rpc CreateJWT(CreateJWTRequest) returns (JWTEntry);

  // Add a referrer to the endpoint allowlist.
  rpc CreateReferrer(CreateReferrerRequest) returns (ReferrerEntry);

  // Create an authentication token for an endpoint.
  rpc CreateToken(CreateTokenRequest) returns (TokenEntry);

  // Delete a domain mask from an endpoint.
  rpc DeleteDomainMask(DeleteDomainMaskRequest) returns (DeleteSecurityEntryResponse);

  // Delete an IP from the endpoint allowlist.
  rpc DeleteIPAllowlist(DeleteIPAllowlistRequest) returns (DeleteSecurityEntryResponse);

  // Delete a JWT from an endpoint.
  rpc DeleteJWT(DeleteJWTRequest) returns (DeleteSecurityEntryResponse);

  // Delete a referrer from an endpoint.
  rpc DeleteReferrer(DeleteReferrerRequest) returns (DeleteSecurityEntryResponse);

  // Delete an authentication token from an endpoint.
  rpc DeleteToken(DeleteTokenRequest) returns (DeleteSecurityEntryResponse);

  // Get tags for an endpoint.
  rpc GetEndpointTags(GetEndpointTagsRequest) returns (GetEndpointTagsResponse);

  // Create a tag for an endpoint.
  rpc CreateEndpointTag(CreateEndpointTagRequest) returns (EndpointTag);
}

// QuickNode Streams API. Create and manage real-time blockchain data streams
// with filter functions. Requires QUICKNODE_API_KEY.
service QuickNodeStreamsService {
  // Create a new blockchain data stream with optional filter function.
  rpc CreateStream(CreateStreamRequest) returns (Stream);

  // List all streams with pagination.
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);

  // Get a stream by ID.
  rpc GetStream(GetStreamRequest) returns (Stream);

  // Update a stream configuration.
  rpc UpdateStream(UpdateStreamRequest) returns (Stream);

  // Delete a stream by ID.
  rpc DeleteStream(DeleteStreamRequest) returns (DeleteStreamResponse);

  // Delete all streams.
  rpc DeleteAllStreams(DeleteAllStreamsRequest) returns (DeleteAllStreamsResponse);

  // Pause an active stream.
  rpc PauseStream(PauseStreamRequest) returns (Stream);

  // Activate a paused stream.
  rpc ActivateStream(ActivateStreamRequest) returns (Stream);

  // Get the count of currently enabled streams.
  rpc GetEnabledStreamCount(GetEnabledStreamCountRequest) returns (GetEnabledStreamCountResponse);

  // Test a stream filter function against sample data.
  rpc TestStreamFilter(TestStreamFilterRequest) returns (TestStreamFilterResponse);
}

// QuickNode Webhooks API. Create and manage event-driven webhooks with
// expression-based filters. Requires QUICKNODE_API_KEY.
service QuickNodeWebhooksService {
  // Create a webhook from a template.
  rpc CreateWebhook(CreateWebhookRequest) returns (Webhook);

  // List all active webhooks.
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);

  // Get details of a specific webhook.
  rpc GetWebhook(GetWebhookRequest) returns (Webhook);

  // Update webhook configuration.
  rpc UpdateWebhook(UpdateWebhookRequest) returns (Webhook);

  // Update a template-created webhook.
  rpc UpdateTemplateWebhook(UpdateTemplateWebhookRequest) returns (Webhook);

  // Delete a specific webhook.
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse);

  // Delete all webhooks.
  rpc DeleteAllWebhooks(DeleteAllWebhooksRequest) returns (DeleteAllWebhooksResponse);

  // Activate a paused webhook.
  rpc ActivateWebhook(ActivateWebhookRequest) returns (Webhook);

  // Pause an active webhook.
  rpc PauseWebhook(PauseWebhookRequest) returns (Webhook);

  // Get the count of currently enabled webhooks.
  rpc GetEnabledWebhookCount(GetEnabledWebhookCountRequest) returns (GetEnabledWebhookCountResponse);
}

// QuickNode Key-Value Store API. Persistent key-value storage for lists and
// sets, useful for tracking addresses, token IDs, and other blockchain data.
// Items are case-sensitive. Requires QUICKNODE_API_KEY.
service QuickNodeKeyValueService {
  // Create a new list.
  rpc CreateList(CreateKVListRequest) returns (KVList);

  // Retrieve all list keys.
  rpc ListLists(ListKVListsRequest) returns (ListKVListsResponse);

  // Retrieve items from a specific list.
  rpc GetList(GetKVListRequest) returns (KVList);

  // Add or remove items from a list.
  rpc UpdateList(UpdateKVListRequest) returns (KVList);

  // Add a single item to a list.
  rpc AddListItem(AddKVListItemRequest) returns (KVList);

  // Check if a list contains a specific item. Items are case-sensitive.
  rpc CheckListContains(CheckKVListContainsRequest) returns (CheckKVListContainsResponse);

  // Remove a specific item from a list.
  rpc DeleteListItem(DeleteKVListItemRequest) returns (DeleteKVListItemResponse);

  // Delete an entire list.
  rpc DeleteList(DeleteKVListRequest) returns (DeleteKVListResponse);

  // Create a new key-value set.
  rpc CreateSet(CreateKVSetRequest) returns (KVSet);

  // Retrieve all set keys.
  rpc ListSets(ListKVSetsRequest) returns (ListKVSetsResponse);

  // Retrieve a set value by key.
  rpc GetSet(GetKVSetRequest) returns (KVSet);

  // Bulk create or delete sets.
  rpc BulkCreateSets(BulkCreateKVSetsRequest) returns (BulkCreateKVSetsResponse);

  // Delete a set by key.
  rpc DeleteSet(DeleteKVSetRequest) returns (DeleteKVSetResponse);
}

// QuickNode IPFS API. Upload, pin, and manage objects on IPFS.
// Requires QUICKNODE_API_KEY.
service QuickNodeIPFSService {
  // Upload an object to IPFS.
  rpc UploadObject(UploadIPFSObjectRequest) returns (IPFSObject);

  // Pin an existing IPFS object by CID.
  rpc PinObject(PinIPFSObjectRequest) returns (IPFSPinnedObject);

  // List all pinned objects with pagination.
  rpc ListPinnedObjects(ListIPFSPinnedObjectsRequest) returns (ListIPFSPinnedObjectsResponse);

  // Get a pinned object by request ID.
  rpc GetPinnedObject(GetIPFSPinnedObjectRequest) returns (IPFSPinnedObject);

  // Get an object by request ID.
  rpc GetObject(GetIPFSObjectRequest) returns (IPFSObject);

  // Update a pinned object's metadata.
  rpc UpdatePinnedObject(UpdateIPFSPinnedObjectRequest) returns (IPFSPinnedObject);

  // Delete (unpin) a pinned object.
  rpc DeletePinnedObject(DeleteIPFSPinnedObjectRequest) returns (DeleteIPFSPinnedObjectResponse);

  // Get IPFS account usage (bandwidth, storage metrics).
  rpc GetIPFSUsage(GetIPFSUsageRequest) returns (GetIPFSUsageResponse);
}

// QuickNode Token & NFT API v2. Enhanced EVM RPC methods for fetching NFTs,
// token balances, transaction history, contract ABIs, block data, and ENS
// resolution. Also includes single-flight RPC, block timestamp lookup,
// multi-region broadcast, and Solana priority fee estimation.
// Requires QUICKNODE_ENDPOINT_URL pointing to an endpoint with these add-ons enabled.
service QuickNodeTokenNFTService {
  // Fetch all NFTs (ERC-721 & ERC-1155) owned by a wallet address.
  // Supports pagination and filtering by contract addresses.
  rpc FetchNFTs(FetchNFTsRequest) returns (FetchNFTsResponse);

  // Fetch NFTs within a specific collection by contract address.
  rpc FetchNFTsByCollection(FetchNFTsByCollectionRequest) returns (FetchNFTsByCollectionResponse);

  // Get high-level details about an NFT collection (name, description, floor price).
  rpc FetchNFTCollectionDetails(FetchNFTCollectionDetailsRequest) returns (FetchNFTCollectionDetailsResponse);

  // Get transfer history for a specific NFT (by contract address and token ID).
  rpc GetTransfersByNFT(GetTransfersByNFTRequest) returns (GetTransfersByNFTResponse);

  // Verify if a wallet owns specific NFTs. Returns which NFTs from the list are owned.
  rpc VerifyNFTsOwner(VerifyNFTsOwnerRequest) returns (VerifyNFTsOwnerResponse);

  // Get ERC-20 token balances for a wallet address.
  rpc GetWalletTokenBalance(GetWalletTokenBalanceRequest) returns (GetWalletTokenBalanceResponse);

  // Get ERC-20 token transactions for a wallet address.
  rpc GetWalletTokenTransactions(GetWalletTokenTransactionsRequest) returns (GetWalletTokenTransactionsResponse);

  // Get token metadata (name, symbol, decimals, total supply) by contract address.
  rpc GetTokenMetadataByContractAddress(GetTokenMetadataByContractAddressRequest) returns (TokenMetadata);

  // Get token metadata by token symbol.
  rpc GetTokenMetadataBySymbol(GetTokenMetadataBySymbolRequest) returns (GetTokenMetadataBySymbolResponse);

  // Get transactions for a wallet address with pagination.
  rpc GetTransactionsByAddress(GetTransactionsByAddressRequest) returns (GetTransactionsByAddressResponse);

  // Get the ABI for a verified smart contract.
  rpc GetContractABI(GetContractABIRequest) returns (GetContractABIResponse);

  // Get all transaction receipts for a block in a single call (Single Flight RPC).
  rpc GetReceipts(GetReceiptsRequest) returns (GetReceiptsResponse);

  // Get block data with all transaction receipts in a single call (Single Flight RPC).
  rpc GetBlockWithReceipts(GetBlockWithReceiptsRequest) returns (GetBlockWithReceiptsResponse);

  // Get the block number at or before a given Unix timestamp.
  rpc GetBlockFromTimestamp(GetBlockFromTimestampRequest) returns (GetBlockFromTimestampResponse);

  // Get all blocks within a Unix timestamp range.
  rpc GetBlocksInTimestampRange(GetBlocksInTimestampRangeRequest) returns (GetBlocksInTimestampRangeResponse);

  // Resolve an ENS name to an address or reverse-resolve an address to an ENS name.
  rpc ResolveENS(ResolveENSRequest) returns (ResolveENSResponse);

  // Broadcast a signed raw transaction across multiple geographic regions for faster propagation.
  rpc BroadcastRawTransaction(BroadcastRawTransactionRequest) returns (BroadcastRawTransactionResponse);

  // Estimate Solana priority fees in percentiles (low/medium/high/extreme/recommended).
  // Requires a Solana endpoint with the Priority Fee API add-on.
  rpc EstimatePriorityFees(EstimatePriorityFeesRequest) returns (EstimatePriorityFeesResponse);
}

// QuickNode Solana Digital Asset Standard (DAS) API. Query compressed and
// standard Solana assets, Merkle proofs, token accounts, and NFT editions.
// Requires QUICKNODE_ENDPOINT_URL pointing to a Solana endpoint with DAS enabled.
service QuickNodeSolanaDASService {
  // Get metadata for a single compressed or standard Solana asset by ID.
  rpc GetAsset(GetDASAssetRequest) returns (DASAsset);

  // Get metadata for multiple assets in a single call.
  rpc GetAssets(GetDASAssetsRequest) returns (GetDASAssetsResponse);

  // Get the Merkle proof for a compressed asset.
  rpc GetAssetProof(GetDASAssetProofRequest) returns (DASAssetProof);

  // Get Merkle proofs for multiple compressed assets.
  rpc GetAssetProofs(GetDASAssetProofsRequest) returns (GetDASAssetProofsResponse);

  // Get assets controlled by a specific authority address.
  rpc GetAssetsByAuthority(GetDASAssetsByAuthorityRequest) returns (GetDASAssetsListResponse);

  // Get assets created by a specific creator address.
  rpc GetAssetsByCreator(GetDASAssetsByCreatorRequest) returns (GetDASAssetsListResponse);

  // Get assets by group identifier (e.g. collection).
  rpc GetAssetsByGroup(GetDASAssetsByGroupRequest) returns (GetDASAssetsListResponse);

  // Get assets owned by a specific wallet address.
  rpc GetAssetsByOwner(GetDASAssetsByOwnerRequest) returns (GetDASAssetsListResponse);

  // List transaction signatures for a compressed asset.
  rpc GetAssetSignatures(GetDASAssetSignaturesRequest) returns (GetDASAssetSignaturesResponse);

  // Query token accounts by mint address or owner address.
  rpc GetTokenAccounts(GetDASTokenAccountsRequest) returns (GetDASTokenAccountsResponse);

  // Get edition NFTs of a master NFT.
  rpc GetNftEditions(GetDASNftEditionsRequest) returns (GetDASNftEditionsResponse);

  // Search for assets matching specific parameters (owner, creator, collection, etc.).
  rpc SearchAssets(SearchDASAssetsRequest) returns (GetDASAssetsListResponse);
}

// ─── Console Messages ────────────────────────────────────────────────────────

message ListChainsRequest {}

message ListChainsResponse {
  repeated Chain chains = 1;
}

message Chain {
  // Chain name (e.g. "ethereum").
  string name = 1;
  // Network name (e.g. "mainnet").
  string network = 2;
  // Current status.
  string status = 3;
}

message ListEndpointsRequest {}

message ListEndpointsResponse {
  repeated Endpoint endpoints = 1;
}

message Endpoint {
  // Unique endpoint ID.
  string id = 1;
  // User-assigned name.
  string name = 2;
  // Blockchain chain.
  string chain = 3;
  // Network (mainnet, testnet, etc.).
  string network = 4;
  // HTTP URL for the endpoint.
  string http_url = 5;
  // WebSocket URL for the endpoint.
  string wss_url = 6;
  // Status (active, paused, archived).
  string status = 7;
  // Creation timestamp.
  string created_at = 8;
  // Plan type.
  string plan = 9;
}

message CreateEndpointRequest {
  // Name for the new endpoint.
  string name = 1;
  // Blockchain chain (e.g. "ethereum", "solana").
  string chain = 2;
  // Network (e.g. "mainnet", "sepolia").
  string network = 3;
}

message GetEndpointRequest {
  // Endpoint ID.
  string endpoint_id = 1;
}

message UpdateEndpointRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // New name for the endpoint.
  string name = 2;
}

message DeleteEndpointRequest {
  // Endpoint ID to archive.
  string endpoint_id = 1;
}

message DeleteEndpointResponse {}

message UpdateEndpointStatusRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // New status: "active" or "paused".
  string status = 2;
}

message GetEndpointMetricsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
}

message GetEndpointMetricsResponse {
  // Total method calls.
  int64 total_calls = 1;
  // Total successful responses (2xx).
  int64 success_count = 2;
  // Total error responses (4xx/5xx).
  int64 error_count = 3;
  // Max response time in milliseconds.
  double max_response_time_ms = 4;
  // Average response time in milliseconds.
  double avg_response_time_ms = 5;
}

message GetEndpointLogsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Start time (ISO 8601 or Unix timestamp).
  string from = 2;
  // End time (ISO 8601 or Unix timestamp).
  string to = 3;
}

message GetEndpointLogsResponse {
  repeated LogEntry logs = 1;
}

message LogEntry {
  // Unique request ID.
  string request_id = 1;
  // RPC method name.
  string method = 2;
  // HTTP status code.
  int32 status_code = 3;
  // Response time in milliseconds.
  double response_time_ms = 4;
  // Timestamp of the request.
  string timestamp = 5;
}

message GetEndpointLogDetailsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Request ID from the logs.
  string request_id = 2;
}

message LogDetail {
  // Unique request ID.
  string request_id = 1;
  // RPC method name.
  string method = 2;
  // HTTP status code.
  int32 status_code = 3;
  // Response time in milliseconds.
  double response_time_ms = 4;
  // Timestamp of the request.
  string timestamp = 5;
  // Request body (JSON string).
  string request_body = 6;
  // Response body (JSON string).
  string response_body = 7;
}

message GetRPCUsageRequest {
  // Start time (ISO 8601 or Unix timestamp).
  string from = 1;
  // End time (ISO 8601 or Unix timestamp).
  string to = 2;
}

message GetRPCUsageResponse {
  // Total number of API credits used.
  int64 total_credits = 1;
  // Total number of requests.
  int64 total_requests = 2;
}

message GetRPCUsageByEndpointResponse {
  repeated EndpointUsage endpoints = 1;
}

message EndpointUsage {
  // Endpoint ID.
  string endpoint_id = 1;
  // Endpoint name.
  string name = 2;
  // Credits used by this endpoint.
  int64 credits = 3;
  // Requests made to this endpoint.
  int64 requests = 4;
}

message GetRPCUsageByMethodResponse {
  repeated MethodUsage methods = 1;
}

message MethodUsage {
  // RPC method name.
  string method = 1;
  // Credits used by this method.
  int64 credits = 2;
  // Number of calls to this method.
  int64 requests = 3;
}

message GetRPCUsageByChainResponse {
  repeated ChainUsage chains = 1;
}

message ChainUsage {
  // Chain name.
  string chain = 1;
  // Network name.
  string network = 2;
  // Credits used on this chain/network.
  int64 credits = 3;
  // Requests on this chain/network.
  int64 requests = 4;
}

message ListInvoicesRequest {}

message ListInvoicesResponse {
  repeated Invoice invoices = 1;
}

message Invoice {
  // Invoice ID.
  string id = 1;
  // Amount in cents.
  int64 amount = 2;
  // Currency code.
  string currency = 3;
  // Invoice status.
  string status = 4;
  // Invoice date.
  string date = 5;
}

message ListPaymentsRequest {}

message ListPaymentsResponse {
  repeated Payment payments = 1;
}

message Payment {
  // Payment ID.
  string id = 1;
  // Amount in cents.
  int64 amount = 2;
  // Currency code.
  string currency = 3;
  // Payment status.
  string status = 4;
  // Payment date.
  string date = 5;
}

message GetMethodRateLimitsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
}

message GetMethodRateLimitsResponse {
  repeated MethodRateLimit limits = 1;
}

message MethodRateLimit {
  // Rate limit ID.
  string id = 1;
  // RPC method name.
  string method = 2;
  // Requests per second limit.
  int32 rps = 3;
  // Requests per minute limit.
  int32 rpm = 4;
  // Requests per day limit.
  int32 rpd = 5;
}

message UpdateRateLimitsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Requests per second limit.
  int32 rps = 2;
  // Requests per minute limit.
  int32 rpm = 3;
  // Requests per day limit.
  int32 rpd = 4;
}

message UpdateRateLimitsResponse {
  // Requests per second limit.
  int32 rps = 1;
  // Requests per minute limit.
  int32 rpm = 2;
  // Requests per day limit.
  int32 rpd = 3;
}

message CreateMethodRateLimitRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // RPC method name to rate limit.
  string method = 2;
  // Requests per second limit.
  int32 rps = 3;
  // Requests per minute limit.
  int32 rpm = 4;
  // Requests per day limit.
  int32 rpd = 5;
}

message UpdateMethodRateLimitRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Rate limit ID to update.
  string method_rate_limit_id = 2;
  // New RPC method name.
  string method = 3;
  // New requests per second limit.
  int32 rps = 4;
  // New requests per minute limit.
  int32 rpm = 5;
  // New requests per day limit.
  int32 rpd = 6;
}

message DeleteMethodRateLimitRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Rate limit ID to delete.
  string method_rate_limit_id = 2;
}

message DeleteMethodRateLimitResponse {}

message GetSecurityOptionsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
}

message SecurityOptions {
  // Whether token authentication is enabled.
  bool token_auth_enabled = 1;
  // Whether JWT authentication is enabled.
  bool jwt_auth_enabled = 2;
  // Whether IP allowlist is enabled.
  bool ip_allowlist_enabled = 3;
  // Whether referrer allowlist is enabled.
  bool referrer_allowlist_enabled = 4;
  // Whether domain mask is enabled.
  bool domain_mask_enabled = 5;
}

message UpdateSecurityOptionsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Enable or disable token authentication.
  bool token_auth_enabled = 2;
  // Enable or disable JWT authentication.
  bool jwt_auth_enabled = 3;
  // Enable or disable IP allowlist.
  bool ip_allowlist_enabled = 4;
  // Enable or disable referrer allowlist.
  bool referrer_allowlist_enabled = 5;
  // Enable or disable domain mask.
  bool domain_mask_enabled = 6;
}

message CreateDomainMaskRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Domain mask pattern.
  string domain = 2;
}

message DomainMask {
  // Domain mask ID.
  string id = 1;
  // Domain mask pattern.
  string domain = 2;
}

message CreateIPAllowlistRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // IP address to allow.
  string ip = 2;
}

message IPAllowlistEntry {
  // Entry ID.
  string id = 1;
  // Allowed IP address.
  string ip = 2;
}

message CreateJWTRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Optional name for the JWT.
  string name = 2;
}

message JWTEntry {
  // JWT ID.
  string id = 1;
  // JWT token value.
  string token = 2;
  // JWT name.
  string name = 3;
}

message CreateReferrerRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Referrer URL pattern.
  string referrer = 2;
}

message ReferrerEntry {
  // Entry ID.
  string id = 1;
  // Referrer URL pattern.
  string referrer = 2;
}

message CreateTokenRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Optional name for the token.
  string name = 2;
}

message TokenEntry {
  // Token ID.
  string id = 1;
  // Authentication token value.
  string token = 2;
  // Token name.
  string name = 3;
}

message DeleteDomainMaskRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Domain mask ID.
  string domain_mask_id = 2;
}

message DeleteIPAllowlistRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // IP allowlist entry ID.
  string ip_id = 2;
}

message DeleteJWTRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // JWT ID.
  string jwt_id = 2;
}

message DeleteReferrerRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Referrer entry ID.
  string referrer_id = 2;
}

message DeleteTokenRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Token ID.
  string token_id = 2;
}

message DeleteSecurityEntryResponse {}

message GetEndpointTagsRequest {
  // Endpoint ID.
  string endpoint_id = 1;
}

message GetEndpointTagsResponse {
  repeated EndpointTag tags = 1;
}

message EndpointTag {
  // Tag ID.
  string id = 1;
  // Tag key.
  string key = 2;
  // Tag value.
  string value = 3;
}

message CreateEndpointTagRequest {
  // Endpoint ID.
  string endpoint_id = 1;
  // Tag key.
  string key = 2;
  // Tag value.
  string value = 3;
}

// ─── Streams Messages ────────────────────────────────────────────────────────

message Stream {
  // Stream ID.
  string id = 1;
  // Stream name.
  string name = 2;
  // Blockchain network (e.g. "ethereum-mainnet").
  string network = 3;
  // Dataset type (e.g. "block", "receipts").
  string dataset = 4;
  // JavaScript filter function code.
  string filter_function = 5;
  // Deployment region.
  string region = 6;
  // Stream status (active, paused).
  string status = 7;
  // Destination URL.
  string destination = 8;
  // Destination type (webhook, s3, postgres, etc.).
  string destination_type = 9;
